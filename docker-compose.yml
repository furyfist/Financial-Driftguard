services:
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # web UI + OTLP HTTP endpoint (/v1/traces)
      - "4317:4317"   # OTLP gRPC endpoint
    environment:
      PHOENIX_WORKING_DIR: /phoenix
    volumes:
      - phoenix_data:/phoenix

  # Phoenix MCP server — lets Claude Desktop and other MCP clients query Phoenix directly
  phoenix-mcp:
    image: node:20-alpine
    command: npx -y @arizeai/phoenix-mcp@latest --baseUrl http://phoenix:6006
    depends_on:
      - phoenix

  backend:
    build: .
    command: uvicorn driftguard.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
    depends_on:
      - phoenix
    volumes:
      - ./driftguard.db:/app/driftguard.db

  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  phoenix_data:
